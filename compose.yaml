services:
  mcp-read-website-fast:
    build: .
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - MCP_API_KEY=${MCP_API_KEY}
      - FASTMCP_HOME=/data/fastmcp
    volumes:
      - fastmcp-data:/data/fastmcp
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2.0"

volumes:
  fastmcp-data:
