[[stack]]
name = "git-mcp-read-website-fast"
description = "MCP server for fast web content extraction to markdown"
deploy = true
tags = ["mcp"]

[stack.config]
server_id = "ubuntu-smurf-mirror"
git_provider = "github.com"
repo = "just-every/mcp-read-website-fast"
branch = "main"
compose_file_path = "compose.yaml"
environment = """
MCP_API_KEY = [[MCP_API_KEY]]
"""
